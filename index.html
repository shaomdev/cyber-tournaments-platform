<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournaments — Esports Platform</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"

              <li class="nav__item">

              <li class="nav__item">
                <a href="#news" class="nav__link">News</a>
              </li>
              <li class="nav__item">
                <a href="#about" class="nav__link">Subscriptions</a>
              </li>
            </ul>
          </nav>

          <!-- Блок авторизации и действий -->
          <div class="header__actions">
            <a href="#signin" class="header__link">Sign In</a>
            <a href="#signup" class="header__btn">Get Started</a>
